name: Daily Analysis

on:
  schedule:
    - cron: '10 20 * * 1-5'
  workflow_dispatch:

concurrency:
  group: daily-analysis
  cancel-in-progress: false
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run analysis
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: node analyze.js

      - name: Commit outcomes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add outcomes.jsonl || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Outcomes [skip ci]"
          git push || true
