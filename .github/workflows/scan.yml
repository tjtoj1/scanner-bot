name: Scanner Bot

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:
  
concurrency:
  group: scanner-bot
  cancel-in-progress: false
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scanner
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          TG_TOKEN:      ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          MIN_SCORE:     ${{ vars.MIN_SCORE || '65' }}
          SEND_SUMMARY:  ${{ vars.SEND_SUMMARY || 'false' }}
        run: node scan.js

      - name: Commit state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add state.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push || true
