name: Volume Hypothesis Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run volume test
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: node test_volume.js
